# Secret scanning — deterministic, runner-agnostic security gate.
#
# Runs gitleaks against the working tree on every push and PR. No Swift toolchain
# required, so this runs green on standard GitHub-hosted runners regardless of the
# project's beta-SDK pin. Hard-fails on any finding: a committed secret is
# unambiguous and must block the merge.
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so `gitleaks git` can scan past commits too

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree for secrets (blocking)
        run: gitleaks dir . --config .gitleaks.toml --redact --verbose --exit-code 1

      # Advisory: a secret already in history should be rotated + scrubbed, but it
      # must not permanently block current work. Surface it without failing.
      - name: Scan git history for secrets (advisory)
        continue-on-error: true
        run: gitleaks git . --config .gitleaks.toml --redact --verbose --exit-code 1
