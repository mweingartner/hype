# Static analysis (SAST) — deterministic security backstop behind the LLM review.
#
# Semgrep is *source-pattern* based: it does not compile the project, so it runs
# on standard hosted runners with no Swift toolchain and is unaffected by the
# project's beta-SDK pin. It catches dangerous patterns (shell/AppleScript/SQL
# injection shapes, weak crypto, hardcoded credentials-as-code) that an LLM
# reviewer can miss.
#
# Posture: INFORMATIONAL to start (continue-on-error) so it never false-blocks a
# merge on day one. Triage the findings, then promote to blocking by removing
# `continue-on-error` once the ruleset is tuned for this codebase. For deeper,
# compiler-aware Swift analysis later, add a CodeQL workflow on a runner that has
# the project's toolchain (CodeQL Swift requires a successful build).
name: sast

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true   # informational until the ruleset is tuned — then remove
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pipx install semgrep || pip3 install --user semgrep

      - name: Run Semgrep (security audit + secrets rulesets)
        run: |
          set -euo pipefail
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config auto \
            --error \
            --metrics off \
            --timeout 120
