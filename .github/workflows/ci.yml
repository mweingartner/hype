# Build + full test suite + interpreter fuzz — the machine-enforced correctness gate.
#
# WHY SELF-HOSTED: this project pins a beta toolchain (Swift 6.4 / macOS 27 SDK,
# via Xcode-beta). GitHub-hosted macOS runners do not carry that SDK, so the build
# cannot run there yet. The gate therefore targets a *self-hosted* macOS runner —
# i.e. the developer machine that already has the toolchain. Once hosted runners
# carry a compatible SDK, switch `runs-on` to `macos-latest` and delete the
# `if:` guard below.
#
# ACTIVATION (one-time, by a repo admin):
#   1. Settings → Actions → Runners → New self-hosted runner (macOS, arm64) and
#      follow the registration steps on the dev machine that has Xcode-beta.
#      Run it as a service:  ./svc.sh install && ./svc.sh start
#   2. Settings → Secrets and variables → Actions → Variables →
#      New repository variable:  SELF_HOSTED_RUNNER_READY = true
#   3. (Recommended) Settings → Branches → Branch protection for `main` →
#      Require status checks → select "build-test-fuzz". Now main is gated.
#
# Until SELF_HOSTED_RUNNER_READY is "true", the job is skipped (clean, no stuck
# queue). The secret-scan and sast workflows run independently on hosted runners
# and gate regardless of this one.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-fuzz:
    # Skip until a self-hosted runner is registered and the flag is flipped.
    if: ${{ vars.SELF_HOSTED_RUNNER_READY == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Select toolchain
        run: |
          set -euo pipefail
          # Prefer Xcode-beta if present (matches local dev toolchain).
          if [ -d /Applications/Xcode-beta.app ]; then
            echo "DEVELOPER_DIR=/Applications/Xcode-beta.app/Contents/Developer" >> "$GITHUB_ENV"
          fi
          swift --version

      - name: Build
        run: swift build

      # Serial mode is deterministic in this environment; the parallel runner can
      # stall here. The full suite includes InterpreterFuzzTests (grammar fuzzer +
      # metamorphic relations), so the fuzz gate runs as part of this step.
      - name: Test (full suite, serial) + fuzz
        run: swift test --no-parallel

      - name: watchOS kernel compile-proof
        run: ./scripts/watch-kernel-probe.sh
