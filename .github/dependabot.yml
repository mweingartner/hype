# Dependency update + vulnerability alerts.
#
# Keeps the SwiftPM dependency graph (swift-argument-parser, and the vendored
# AudioKit's transitive pins) and the GitHub Actions used by the workflows above
# under automated review. Dependabot opens PRs for updates and, combined with
# GitHub's dependency graph, surfaces known-CVE alerts in the Security tab.
#
# Note: the vendored AudioKit at Vendor/AudioKit is a path dependency and is
# intentionally pinned (see Vendor/AudioKit/HYPE_VENDOR_NOTE.md); Dependabot
# tracks the declared SwiftPM manifest, not the vendored source.
version: 2
updates:
  - package-ecosystem: swift
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
