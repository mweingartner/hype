# Focused Qwen repair rows for script-attachment routing.
#
# The Qwen3 8B v1 model learned HypeTalk syntax and most tool calls,
# but live dispatch showed one recurring failure: when a user asks to
# create/set/attach a script, the model may answer with the HypeTalk
# body instead of calling the Hype setter tool. These rows reinforce
# the product contract: script installation is a tool action.

examples:
  - intent: "Create the script on the bounder object on this card with one that sets all sprites in motion with physics, bouncing off the perimeter of the scene and each other. Have the script look for if the mouse intersects the location of the blue_ball sprite and, if it ever does, increase the velocity of the blue_ball by 50% each time."
    tool_call:
      name: "set_scene_script"
      arguments:
        sprite_area_name: "bounder"
        script: |
          on sceneDidLoad
            set the restitution of sprite "blue_ball" to 1
            set the restitution of sprite "red_ball" to 1
            set the contactTestBitmask of sprite "blue_ball" to 1
            set the contactTestBitmask of sprite "red_ball" to 1
            set the velocityX of sprite "blue_ball" to 200
            set the velocityY of sprite "blue_ball" to 150
            set the velocityX of sprite "red_ball" to -180
            set the velocityY of sprite "red_ball" to 220
            global wasHovering
            put "false" into wasHovering
          end sceneDidLoad

          on frameUpdate
            global wasHovering
            if the hoveredSprite is "blue_ball" then
              if wasHovering is "false" then
                set the velocityX of sprite "blue_ball" to (the velocityX of sprite "blue_ball") * 1.5
                set the velocityY of sprite "blue_ball" to (the velocityY of sprite "blue_ball") * 1.5
                put "true" into wasHovering
              end if
            else
              put "false" into wasHovering
            end if
          end frameUpdate

