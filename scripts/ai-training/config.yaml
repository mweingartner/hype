# Fine-tuning pipeline configuration.
#
# Every knob the pipeline needs lives here. Individual stages
# (gen_corpus, train, fuse, package, eval) read this file directly
# so there is ONE source of truth for model names, paths, and
# hyperparameters — not 6 shell-script constants drifting out of sync.
#
# After editing, re-run `make all` from the scripts/ai-training
# directory. All stages are incremental (Makefile targets) so only
# the affected stages re-run.

# ----- Base model -----
# Hugging Face repo to fine-tune from. MLX-LM pulls this on first
# use. The Qwen3 8B MLX mirror keeps this run small enough to iterate
# quickly while preserving native Ollama tool-call behavior.
base_model: "mlx-community/Qwen3-8B-bf16"
model_family: "qwen3"
tool_format: "qwen3"

# ----- Output model name -----
# Ollama tag the pipeline creates at the end. Bump the version
# suffix on every training run so you can A/B compare against the
# previous version.
#
# v6 (Apr 2026): micro-corpus route-correction pass from archived
# v4. v5's broader full-corpus continuation regressed structured
# Ollama tool calling, so v6 trains only explicit tool-call routing
# labels for the failing intents plus basic property/introspection
# guardrails.
output_model: "hypetalk-qwen3:8b-v6"

# ----- LoRA hyperparameters -----
# Sensible defaults for instruction fine-tuning on a small domain-
# specific corpus. Larger rank = more capacity but also more risk
# of overfit on a ~500-2000 example corpus.
lora:
  rank: 16                 # Qwen3 8B has enough base code/tool ability
                           # that rank 16 is the first-pass sweet spot:
                           # enough capacity for HypeTalk/tool names
                           # without overfitting the small corpus.
  alpha: 32                # Kept at 2× rank (documentation value; MLX
                           # uses mlx_lora_config.yaml's scale field).
  dropout: 0.05
  num_layers: 16           # Apply LoRA to the top N transformer blocks
  learning_rate: 1.0e-6       # v5 is a corrective continuation from v4;
                              # keep LR low to avoid damaging working
                              # property/introspection behavior.
  batch_size: 1            # Keep batch=1 for stable MLX memory use.
  iters: 80                 # v6 micro-corpus pass. Keep this short:
                           # the adapter already knows HypeTalk and
                           # most tools; this only corrects routing.
  grad_accumulation_steps: 1
                           # v3: dropped from 8 → 1. The original v2
                           # run never actually passed
                           # --grad-accumulation-steps to mlx_lm.lora
                           # (the CLI argument wasn't wired in
                           # train.sh), so v2's "effective" value was
                           # 1 by default. At grad-accum=8 each iter
                           # runs 8× forward+backward passes which on
                           # M5 Max at rank 24 + seq 4k turns a 3-hour
                           # run into a 24-hour run with no quality
                           # lift for a small corpus. Keeping parity
                           # with v2's implicit behaviour here.
  grad_checkpoint: false   # 8B should fit comfortably after unloading
                           # Ollama runners; flip on only if MLX reports
                           # memory pressure.
  save_every: 40           # Two checkpoints for the short v6 pass.
  max_seq_length: 4096     # Keep parity with the repaired v4 corpus. The
                           # tool-call rows were explicitly trimmed to fit
                           # under this cap, so lowering it would silently
                           # cut assistant labels instead of just slowing
                           # training a bit.
  seed: 42

# ----- Ollama model metadata -----
# Applied to the Modelfile's SYSTEM prompt and PARAMETER defaults.
ollama:
  temperature: 0.2         # Low temp for deterministic HypeTalk output
  top_p: 0.9
  num_ctx: 32768           # Qwen3's local template supports long
                           # contexts; 32k leaves room for Hype's tool
                           # catalog plus CURRENT STATE and tool results.
  think: false             # Tool/eval traffic should return direct tool
                           # calls or HypeTalk, not thinking traces.
  # The SYSTEM prompt is pulled from HypeTalkGuide.llmContext at
  # build time so the Modelfile always matches the running app's
  # expectations. See src/package.sh.

# ----- Eval -----
eval:
  prompts_file: "eval/prompts.jsonl"
  # How many times to sample each prompt; majority-grade to smooth
  # out sampling variance. 1 = deterministic, single-shot.
  samples_per_prompt: 1
  # Run eval against the NEW tuned model AND the base model side by
  # side so you can see lift from training rather than absolute score.
  baseline_model: "qwen3:latest"
